<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF - DeepGloss</title>
  <link rel="stylesheet" href="./viewer.css" />
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <div class="toolbar-group">
      <button id="sidebar-toggle" class="toolbar-btn" title="Toggle Sidebar">&#9776;</button>
    </div>
    <div class="toolbar-group">
      <button id="prev-page" class="toolbar-btn" title="Previous Page">&#9664;</button>
      <input id="page-input" type="number" min="1" value="1" />
      <span>/ <span id="page-count">-</span></span>
      <button id="next-page" class="toolbar-btn" title="Next Page">&#9654;</button>
    </div>
    <div class="toolbar-group">
      <button id="zoom-out" class="toolbar-btn" title="Zoom Out">&minus;</button>
      <select id="zoom-select">
        <option value="auto">Auto</option>
        <option value="page-fit">Fit Page</option>
        <option value="page-width" selected>Fit Width</option>
        <option value="0.5">50%</option>
        <option value="0.75">75%</option>
        <option value="1">100%</option>
        <option value="1.25">125%</option>
        <option value="1.5">150%</option>
        <option value="2">200%</option>
      </select>
      <button id="zoom-in" class="toolbar-btn" title="Zoom In">+</button>
    </div>
    <div class="toolbar-group toolbar-end">
      <span class="toolbar-hint">DeepGloss PDF — select text to translate</span>
    </div>
  </div>

  <!-- Main layout -->
  <div id="main">
    <!-- Sidebar (outline / thumbnails) -->
    <div id="sidebar" class="sidebar-open">
      <div id="sidebar-tabs">
        <button id="tab-outline" class="sidebar-tab active" title="Document Outline">Outline</button>
      </div>
      <div id="outline-container" class="sidebar-content"></div>
    </div>

    <!-- PDF viewer container -->
    <div id="viewer-container">
      <div id="viewer" class="pdfViewer"></div>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div id="loading-text">Loading PDF...</div>
  </div>

  <script type="module" src="./viewer.ts"></script>
</body>
</html>
